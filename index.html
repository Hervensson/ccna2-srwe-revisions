<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>CCNA 2 SRWE - Examen de révision</title>
    <link rel="stylesheet" href="styles.css?v=4">
  </head>
  <body>
    <main class="app">
      <section id="startScreen" class="start-screen hidden">
        <div class="brand-row">
          <span class="brand-mark">SRWE</span>
          <span>CCNA 2</span>
        </div>
        <h1>Examen de révision</h1>
        <p id="bankSummary" class="muted"></p>
        <div class="start-actions">
          <button id="startBtn" class="primary-action">Démarrer une session</button>
          <button id="redoErrorsStartBtn" class="secondary-action">Refaire mes erreurs</button>
          <a class="download-action" href="ccna2-srwe-revisions-site.zip" download>Télécharger le site</a>
        </div>
        <div id="startHistory" class="history-panel"></div>
      </section>

      <section id="examShell" class="exam-shell hidden">
        <header class="topbar">
          <div>
            <div class="brand-row compact">
              <span class="brand-mark">SRWE</span>
              <span>Mode examen</span>
            </div>
            <h1 id="sessionTitle">Question 1 sur 70</h1>
            <p id="sessionMode" class="mode-line"></p>
          </div>
          <div class="exam-stats" aria-label="Statistiques de session">
            <div class="stat">
              <span>Temps</span>
              <strong id="timer">01:15:00</strong>
            </div>
            <div class="stat">
              <span>Progression</span>
              <strong id="progressText">0/70</strong>
            </div>
          <button id="resetBtn" class="ghost-button">Nouvelle session</button>
          </div>
        </header>

        <div class="progress-track" aria-hidden="true">
          <div id="progressFill" class="progress-fill"></div>
        </div>

        <div class="layout">
          <aside class="question-map" aria-label="Navigation des questions">
            <div id="questionGrid" class="question-grid"></div>
          </aside>

          <article class="question-panel">
            <div id="questionMeta" class="question-meta"></div>
            <h2 id="questionText" class="question-text"></h2>
            <div id="imageWrap" class="image-wrap"></div>
            <div id="answerArea" class="answer-area"></div>
          </article>
        </div>

        <footer class="bottombar">
          <button id="prevBtn" class="secondary-action">Précédente</button>
          <button id="difficultBtn" class="flag-button" aria-pressed="false">Question difficile</button>
          <button id="nextBtn" class="secondary-action">Suivante</button>
          <button id="submitBtn" class="primary-action">Soumettre</button>
        </footer>
      </section>

      <section id="resultScreen" class="result-screen hidden">
        <header class="result-header">
          <div>
            <div class="brand-row compact">
              <span class="brand-mark">SRWE</span>
              <span>Resultats</span>
            </div>
            <h1>Correction finale</h1>
          </div>
          <div class="result-actions">
            <button id="redoWrongBtn" class="secondary-action">Refaire uniquement les erreurs</button>
            <button id="newFromResultsBtn" class="primary-action">Nouvelle session</button>
          </div>
        </header>

        <div id="scoreBoard" class="score-board"></div>
        <div id="themeStats" class="theme-stats"></div>
        <div id="historyPanel" class="history-panel"></div>
        <div class="result-tabs" role="tablist" aria-label="Filtres de correction">
          <button class="tab-button active" data-filter="wrong">Mes erreurs</button>
          <button class="tab-button" data-filter="difficult">Questions difficiles</button>
          <button class="tab-button" data-filter="themeWeak">Thèmes faibles</button>
          <button class="tab-button" data-filter="all">Tout afficher</button>
        </div>
        <div id="resultsList" class="results-list"></div>
      </section>
    </main>

    <script src="questions.js?v=4"></script>
    <script src="app.js?v=4"></script>
  </body>
</html>
